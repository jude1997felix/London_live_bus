<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Live — Bus Tracker</title>
  <link rel="preconnect" href="https://api.tfl.gov.uk" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>London Live <span class="badge">BUS</span></h1>
        <p class="tagline">Real-time bus routes &amp; arrivals</p>
      </header>

      <div class="mode-switch" role="tablist">
        <button id="mode-track" class="mode-btn active" role="tab">🚌 Track route</button>
        <button id="mode-plan" class="mode-btn" role="tab">🧭 Plan journey</button>
      </div>

      <!-- ===== Track-a-route mode ===== -->
      <div id="track-mode">
        <form id="search-form" autocomplete="off">
          <label for="route-input">Bus route</label>
          <div class="search-row">
            <input
              id="route-input"
              type="text"
              inputmode="numeric"
              placeholder="e.g. 38, 73, N29"
              aria-label="Bus route number"
            />
            <button type="submit" id="search-btn">Go</button>
          </div>
          <button type="button" id="nearme-btn">📍 Find stops near me</button>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </form>

        <div id="nearby-meta" class="hidden">
          <h2 id="nearby-title">Nearest stops</h2>
          <ul id="nearby-list" aria-label="Nearby stops"></ul>
        </div>

        <div id="route-meta" class="hidden">
          <div class="direction-toggle">
            <button data-dir="outbound" class="dir-btn active">Outbound</button>
            <button data-dir="inbound" class="dir-btn">Inbound</button>
          </div>
          <h2 id="route-title"></h2>
          <ul id="stop-list" aria-label="Stops on route"></ul>
        </div>
      </div>

      <!-- ===== Plan-a-journey mode ===== -->
      <div id="plan-mode" class="hidden">
        <form id="plan-form" autocomplete="off">
          <label for="from-input">From</label>
          <div class="search-row">
            <input id="from-input" type="text" placeholder="Place, postcode or station" aria-label="Journey start" />
            <button type="button" class="loc-btn" data-target="from" title="Use my location">📍</button>
          </div>
          <label for="to-input">To</label>
          <div class="search-row">
            <input id="to-input" type="text" placeholder="Place, postcode or station" aria-label="Journey destination" />
            <button type="button" class="loc-btn" data-target="to" title="Use my location">📍</button>
          </div>
          <button type="submit" id="plan-btn">Plan journey</button>
          <div id="plan-status" class="status" role="status" aria-live="polite"></div>
        </form>

        <div id="journey-results" class="hidden">
          <h2 id="journey-title">Journey options</h2>
          <ul id="journey-list" aria-label="Journey options"></ul>
        </div>
      </div>
    </aside>

    <main id="map" aria-label="Map of bus route"></main>
  </div>

  <div id="arrivals-panel" class="hidden" role="dialog" aria-label="Live arrivals">
    <div class="ap-head">
      <h3 id="ap-stop-name"></h3>
      <button id="ap-close" aria-label="Close">&times;</button>
    </div>
    <div id="ap-body"></div>
    <div class="ap-foot">
      <span id="ap-refresh-note"></span>
    </div>
  </div>

  <div id="bus-panel" class="hidden" role="dialog" aria-label="Bus upcoming stops">
    <div class="ap-head">
      <h3 id="bp-title">🚌 Bus</h3>
      <button id="bp-close" aria-label="Close">&times;</button>
    </div>
    <div id="bp-body"></div>
    <div class="ap-foot">
      <span id="bp-note"></span>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Default config so the app runs even when config.js is absent
       (it's git-ignored, so the public GitHub Pages build has no key). -->
  <script>window.TFL_CONFIG = { appKey: "" };</script>
  <script src="config.js" onerror="/* no local key — run keyless */"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
